<section id="habilidades" class="container mb-5" style="padding-top: 80px; margin-top: -80px;">
  
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Habilidades y Tecnologías</h2>
    <button *ngIf="esAdmin" class="btn btn-success rounded-pill px-4 shadow-sm fw-bold" data-bs-toggle="modal" data-bs-target="#habilidadesModal" (click)="limpiarFormulario()">
      + Agregar
    </button>
  </div>

  <div class="row">
    <div class="col-md-6 mb-4" *ngFor="let hab of misHabilidades">
      
      <div class="card text-bg-dark border-secondary shadow-sm h-100 p-3 d-flex flex-row align-items-center justify-content-between rounded-4">
        
        <div class="d-flex align-items-center w-75">
          <img *ngIf="hab.icono_url" [src]="hab.icono_url" alt="{{ hab.nombre }}" style="width: 45px; height: 45px; margin-right: 15px; object-fit: contain;">
          
          <div class="w-100 pe-3">
            <h6 class="mb-2 fw-bold text-light">{{ hab.nombre }}</h6>
            <div class="progress bg-secondary" style="height: 8px;">
              <div class="progress-bar bg-info" [style.width.%]="hab.porcentaje"></div>
            </div>
          </div>
        </div>

        <div class="d-flex gap-2" *ngIf="esAdmin">
          
          <button class="btn btn-outline-warning btn-sm border-0" data-bs-toggle="modal" data-bs-target="#habilidadesModal" (click)="cargarDatosParaEditar(hab)" title="Editar">
            <i class="bi bi-pencil-square fs-5"></i>
          </button>
          
          <button class="btn btn-outline-danger btn-sm border-0" (click)="borrarHabilidad(hab.id)" title="Borrar">
            <i class="bi bi-trash fs-5"></i>
          </button>
          
        </div>

      </div>
      </div>
  </div>
</section>

<div class="modal fade" id="habilidadesModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow-lg border-0 rounded-4">
      
      <div class="modal-header border-0">
        <h5 class="fw-bold">{{ esEdicion ? 'Editar' : 'Nueva' }} Habilidad</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      
      <form (ngSubmit)="guardarCambios()">
        
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label small">NOMBRE (Ej: Angular)</label>
            <input type="text" class="form-control" [(ngModel)]="formHab.nombre" name="nombre">
          </div>
          <div class="mb-3">
            <label class="form-label small">PORCENTAJE (1 al 100)</label>
            <input type="number" class="form-control" [(ngModel)]="formHab.porcentaje" name="porcentaje">
          </div>
          <div class="mb-3">
            <label class="form-label small">URL DEL ICONO</label>
            <input type="text" class="form-control" [(ngModel)]="formHab.icono_url" name="icono_url">
          </div>
        </div>
        
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
          
          <button type="submit" class="btn btn-primary" data-bs-dismiss="modal">Guardar</button>
        </div>
        
      </form>
      </div>
  </div>
</div>
