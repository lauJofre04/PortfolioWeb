<header>
    <div class="row">
        <nav class="navbar navbar-expand-lg fixed-top shadow-sm" style="background-color: var(--navbar-bg);">
            <div class="container">

                <a class="navbar-brand fw-bold" style="color: var(--navbar-text);" href="#">
                <span class="text-primary">&lt;/&gt;</span> Lautaro Jofre
                </a>

                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavegacion" aria-controls="menuNavegacion" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="menuNavegacion">
                
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 text-center">
                    <li class="nav-item"><a class="nav-link px-3" href="#presentacion">{{ 'NAV.PRESENTACION' | translate }}</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="#estudios">{{ 'NAV.ESTUDIOS' | translate }}</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="#experiencia">{{ 'NAV.EXPERIENCIA' | translate }}</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="#habilidades">{{ 'NAV.HABILIDADES' | translate }}</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="#proyectos">{{ 'NAV.PROYECTOS' | translate }}</a></li>
                </ul>
                <div class="d-flex justify-content-center gap-2 mt-3 mt-lg-0">
                    <!-- Botones de tema e idioma -->
                    <button class="btn btn-outline-secondary btn-sm rounded-pill px-3" (click)="toggleTheme()">
                        <i class="bi" [class]="isDarkMode ? 'bi-sun' : 'bi-moon'"></i>
                        {{ isDarkMode ? ('THEME.TOGGLE_LIGHT' | translate) : ('THEME.TOGGLE_DARK' | translate) }}
                    </button>
                    <button class="btn btn-outline-info btn-sm rounded-pill px-3" (click)="changeLanguage(currentLang === 'es' ? 'en' : 'es')">
                        {{ currentLang === 'es' ? ('LANG.ENGLISH' | translate) : ('LANG.SPANISH' | translate) }}
                    </button>

                    <ng-container *ngIf="!estaLogueado">
                    <button class="btn btn-outline-light btn-sm rounded-pill px-4 fw-bold" data-bs-toggle="modal" data-bs-target="#loginModal">
                        {{ 'NAV.INGRESAR' | translate }}
                    </button>
                    <button class="btn btn-primary btn-sm rounded-pill px-4 fw-bold shadow-sm" data-bs-toggle="modal" data-bs-target="#registroModal">
                        {{ 'NAV.REGISTRARSE' | translate }}
                    </button>
                    </ng-container>

                    <ng-container *ngIf="estaLogueado">
                    <button class="btn btn-outline-danger btn-sm rounded-pill px-4 fw-bold" (click)="cerrarSesion()">
                        {{ 'NAV.CERRAR_SESION' | translate }}
                    </button>
                    </ng-container>

                </div>

                </div>
            </div>
            </nav>
    </div>

    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered" style="max-width: 400px;">
        <div class="modal-content shadow-lg border-0 rounded-4 p-3">
          
          <div class="modal-header border-0 pb-0">
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          
          <div class="modal-body text-center pt-0">
            <h4 class="fw-bold mb-4" style="color: #c2c2c2;">¡Bienvenido de vuelta!</h4>
            
            <form (ngSubmit)="iniciarSesion()">
              <div class="mb-4 text-start">
                <label class="form-label fw-bold text-muted small mb-1">Usuario:</label>
                <input type="text" class="form-control form-control-lg bg-light border-0" [(ngModel)]="credenciales.username" name="username" placeholder="Ej: lauJofre">
              </div>
              
              <div class="mb-4 text-start">
                <label class="form-label fw-bold text-muted small mb-1">Contraseña:</label>
                <input type="password" class="form-control form-control-lg bg-light border-0" [(ngModel)]="credenciales.password" name="password" placeholder="********">
              </div>
              
              <button type="submit" class="btn btn-success btn-lg w-100 rounded-pill fw-bold shadow-sm" style="background-color: #1abc9c; border: none;" data-bs-dismiss="modal">
                INGRESAR
              </button>
            </form>
            </div>
        </div>
      </div>
    </div>
    <div class="modal fade" id="registroModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 400px;">
        <div class="modal-content shadow-lg border-0 rounded-4 p-3">
        
        <div class="modal-header border-0 pb-0">
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        
        <div class="modal-body text-center pt-0">
            <h4 class="fw-bold mb-4" style="color: #c2c2c2;">Crear Cuenta</h4>
            
            <form (ngSubmit)="registrarse()">
            
            <div class="mb-4 text-start">
                <label class="form-label fw-bold text-muted small mb-1">Nuevo Usuario:</label>
                <input type="text" class="form-control form-control-lg bg-light border-0" [(ngModel)]="credencialesRegistro.username" name="regUsername" placeholder="Ej: visitante123">
            </div>
            
            <div class="mb-4 text-start">
                <label class="form-label fw-bold text-muted small mb-1">Contraseña:</label>
                <input type="password" class="form-control form-control-lg bg-light border-0" [(ngModel)]="credencialesRegistro.password" name="regPassword" placeholder="********">
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill fw-bold shadow-sm" data-bs-dismiss="modal">
                REGISTRARME
            </button>
            
            </form>
        </div>
        </div>
    </div>
</div>
</header>
