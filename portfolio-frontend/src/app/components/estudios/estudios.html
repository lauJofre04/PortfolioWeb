<section id="estudios" class="container mb-5" style="padding-top: 80px; margin-top: -80px;">
  
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Educación y Cursos</h2>
    <button *ngIf="esAdmin" class="btn btn-success rounded-pill px-4 shadow-sm fw-bold" data-bs-toggle="modal" data-bs-target="#estudioModal" (click)="limpiarFormulario()">
      + Agregar
    </button>
  </div>

  <div class="row justify-content-center">
    <div class="col-12 mb-4" *ngFor="let estudio of misEstudios">
      
      <div class="card text-bg-dark border-secondary shadow-sm rounded-4">
        <div class="card-body p-4 d-flex flex-column flex-md-row justify-content-between align-items-md-center">
          
          <div class="mb-3 mb-md-0 w-100 pe-md-3">
            <div class="d-flex align-items-center mb-2 gap-3">
              <h5 class="card-title fw-bold text-light mb-0">{{ estudio.titulo }}</h5>
              <span class="badge bg-primary rounded-pill fs-6">{{ estudio.fecha_inicio | date:'yyyy' }}</span>
            </div>
            
            <h6 class="card-subtitle mb-3 text-info fw-bold">{{ estudio.institucion }}</h6>
            <p class="card-text text-light mb-0" style="opacity: 0.9;">{{ estudio.descripcion }}</p>
          </div>
          
          <div class="d-flex gap-2 flex-shrink-0" *ngIf="esAdmin">
            <button class="btn btn-outline-warning btn-sm border-0" data-bs-toggle="modal" data-bs-target="#estudioModal" (click)="cargarDatosParaEditar(estudio)" title="Editar">
              <i class="bi bi-pencil-square fs-5"></i>
            </button>
            
            <button class="btn btn-outline-danger btn-sm border-0" (click)="borrarEstudios(estudio.id)" title="Borrar">
              <i class="bi bi-trash fs-5"></i>
            </button>
          </div>

        </div>
      </div>
      </div>
  </div>
</section>
<div class="modal fade" id="estudioModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow-lg border-0 rounded-4">
      
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold" id="exampleModalLabel">
          {{ esEdicion ? 'Editar Estudio' : 'Nuevo Estudio' }}
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      
      <form (ngSubmit)="guardarCambios()">
        
        <div class="modal-body">
          <div class="mb-3">
            <label for="titulo" class="form-label text-muted small">TÍTULO O CARRERA</label>
            <input type="text" class="form-control" id="titulo" [(ngModel)]="formEstudio.titulo" name="titulo" placeholder="Ej: Ingeniería en Sistemas">
          </div>
          <div class="mb-3">
            <label for="institucion" class="form-label text-muted small">INSTITUCIÓN</label>
            <input type="text" class="form-control" id="institucion" [(ngModel)]="formEstudio.institucion" name="institucion" placeholder="Ej: UTN">
          </div>
          <div class="mb-3">
            <label for="descripcion" class="form-label text-muted small">DESCRIPCIÓN</label>
            <textarea class="form-control" id="descripcion" [(ngModel)]="formEstudio.descripcion" name="descripcion" rows="3"></textarea>
          </div>
          <div class="mb-3">
            <label for="fecha" class="form-label text-muted small">FECHA INICIO</label>
            <input type="date" class="form-control" id="fecha" [(ngModel)]="formEstudio.fecha_inicio" name="fecha_inicio">
          </div>
        </div>
        
        <div class="modal-footer border-0 d-flex justify-content-between">
          <button type="button" class="btn btn-light text-secondary" data-bs-dismiss="modal">Cancelar</button>
          
          <button type="submit" class="btn btn-primary px-4 rounded-pill" data-bs-dismiss="modal">
            {{ esEdicion ? 'Guardar Cambios' : 'Agregar' }}
          </button>
        </div>

      </form>
      </div>
  </div>
</div>
